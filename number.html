      <header div class="header">
        <h1>Number Guessing Game</h1>
    </header>


<h2 class="pages">Guess the Number (1-100)</h2>

<article class="pages">
    <p>Try to guess the secret number in as few attempts as possible!</p>
<input type="number" id="guessInput">
<button onclick="checkGuess()">Guess</button>
<p id="message"></p>
</article>

<script>
let secretNumber = Math.floor(Math.random() * 100) + 1;
let attempts = 0;

function checkGuess() {
    let guess = Number(document.getElementById("guessInput").value);
    attempts++;

    if (guess > secretNumber) {
        document.getElementById("message").innerText = "Too high!";
    } else if (guess < secretNumber) {
        document.getElementById("message").innerText = "Too low!";
    } else if (guess === secretNumber) {
        document.getElementById("message").innerText =
            "Correct! Attempts: " + attempts;
    } else {
        document.getElementById("message").innerText =
            "Enter a valid number.";
    }
}
</script>
